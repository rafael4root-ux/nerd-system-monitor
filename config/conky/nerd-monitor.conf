conky.config = {
    alignment = 'top_right',
    background = false,
    border_width = 0,
    cpu_avg_samples = 2,
    default_color = '00D9FF',
    color1 = 'FF003C',
    color2 = 'FFD700',
    color3 = '00D9FF',
    color4 = '7CFC00',
    color5 = 'FF6347',
    default_outline_color = 'white',
    default_shade_color = 'black',
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = true,
    extra_newline = false,
    font = 'JetBrains Mono:size=9',
    gap_x = 20,
    gap_y = 40,
    minimum_height = 5,
    minimum_width = 340,
    maximum_width = 380,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_ncurses = false,
    out_to_stderr = false,
    out_to_x = true,
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'desktop',
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 140,
    own_window_colour = '0a0a0a',
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    show_graph_range = false,
    show_graph_scale = false,
    stippled_borders = 0,
    update_interval = 2.0,
    uppercase = false,
    use_spacer = 'none',
    use_xft = true,
    xinerama_head = 0,
}

conky.text = [[
${color2}${font JetBrains Mono:bold:size=14}⚡ SYSTEM MONITOR${font}${color}
${color1}━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━${color}

${color2}◈ SYSTEM ${color}${hr 1}
${color3}  Host:${color}    ${alignr}${nodename}
${color3}  OS:${color}      ${alignr}${execi 86400 lsb_release -d | cut -f2}
${color3}  Kernel:${color}  ${alignr}${kernel}
${color3}  Uptime:${color}  ${alignr}${uptime}
${color3}  Load:${color}    ${alignr}${loadavg}
${color3}  Users:${color}   ${alignr}${user_number} logged in

${color2}◈ CPU ${color}[${freq_g}GHz] [${hwmon 8 temp 1}°C]${hr 1}
${color3}  Total:${color} ${cpu cpu0}% ${alignr}${cpubar cpu0 8,180}
${color3}  Core 0:${color} ${cpu cpu1}% ${alignr}${cpubar cpu1 6,140}
${color3}  Core 1:${color} ${cpu cpu2}% ${alignr}${cpubar cpu2 6,140}
${color3}  Core 2:${color} ${cpu cpu3}% ${alignr}${cpubar cpu3 6,140}
${color3}  Core 3:${color} ${cpu cpu4}% ${alignr}${cpubar cpu4 6,140}
  ${cpugraph cpu0 30,340 00D9FF FF003C -t}

${color2}◈ MEMORY${color}${hr 1}
${color3}  RAM:${color}  ${mem}/${memmax} ${alignr}${memperc}% ${membar 8,120}
${color3}  SWAP:${color} ${swap}/${swapmax} ${alignr}${swapperc}% ${swapbar 8,120}
${color3}  Buffers:${color} ${buffers} ${alignr}${color3}Cache:${color} ${cached}

${color2}◈ GPU  ${color}[NVIDIA RTX 4050]${hr 1}
${color3}  Usage:${color}  ${alignr}${execi 5 nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader}
${color3}  Temp:${color}   ${alignr}${execi 5 nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader}°C
${color3}  VRAM:${color}   ${alignr}${execi 5 nvidia-smi --query-gpu=memory.used --format=csv,noheader} / ${execi 60 nvidia-smi --query-gpu=memory.total --format=csv,noheader}
${color3}  Power:${color}  ${alignr}${execi 5 nvidia-smi --query-gpu=power.draw --format=csv,noheader}
${color3}  Fan:${color}    ${alignr}${execi 5 nvidia-smi --query-gpu=fan.speed --format=csv,noheader}

${color2}◈ BATTERY${color}${hr 1}
${color3}  Status:${color} ${execi 30 cat /sys/class/power_supply/BAT0/status} ${alignr}${battery_percent BAT0}% ${battery_bar 8,120 BAT0}

${color2}◈ STORAGE${color}${hr 1}
${color3}  /${color}     ${fs_used /}/${fs_size /} ${alignr}${fs_used_perc /}% ${fs_bar 8,100 /}
${color3}  /home${color} ${fs_used /home}/${fs_size /home} ${alignr}${fs_used_perc /home}% ${fs_bar 8,100 /home}
${color3}  I/O:${color}  Read: ${diskio_read} ${alignr}Write: ${diskio_write}
  ${diskiograph 25,340 00D9FF FF003C -t}

${color2}◈ NETWORK ${color}[wlo1]${hr 1}
${color3}  IP Local:${color}  ${alignr}${addr wlo1}
${color3}  IP Public:${color} ${alignr}${execi 300 curl -s ifconfig.me}
${color3}  Gateway:${color}  ${alignr}${gw_ip}
${color3}  DNS:${color}      ${alignr}${execi 300 grep nameserver /etc/resolv.conf | head -1 | awk '{print $2}'}
${color3}  SSID:${color}     ${alignr}${wireless_essid wlo1}
${color3}  Signal:${color}   ${alignr}${wireless_link_qual_perc wlo1}%
${color4}  ▼${color} ${downspeed wlo1} ${alignr}${color5}▲${color} ${upspeed wlo1}
  ${downspeedgraph wlo1 20,165 7CFC00 00D9FF -t} ${upspeedgraph wlo1 20,165 FF6347 FFD700 -t}
${color3}  Total ▼:${color} ${totaldown wlo1} ${alignr}${color3}Total ▲:${color} ${totalup wlo1}

${color2}◈ LISTENING PORTS${color}${hr 1}
${color3}${execi 10 ss -tlnp 2>/dev/null | awk 'NR>1 {split($4,a,":"); port=a[length(a)]; split($6,p,"\""); proc=p[2]; if(proc=="") proc="???"; printf "  %-6s %-18s\n", port, proc}' | sort -t' ' -k1 -n | uniq | head -12}${color}

${color2}◈ ACTIVE CONNECTIONS${color}${hr 1}
${color3}  Established:${color} ${alignr}${execi 10 ss -tn state established | wc -l}
${color3}  Time-Wait:${color}   ${alignr}${execi 10 ss -tn state time-wait | wc -l}
${color3}  Close-Wait:${color}  ${alignr}${execi 10 ss -tn state close-wait | wc -l}
${color3}  Listen:${color}      ${alignr}${execi 10 ss -tln | tail -n +2 | wc -l}
${color3}${execi 15 ss -tnp state established 2>/dev/null | awk 'NR>1 {split($4,l,":"); split($5,r,":"); split($6,p,"\""); proc=p[2]; if(proc=="") proc="???"; printf "  %-12s :%s → %s:%s\n", proc, l[length(l)], r[1], r[length(r)]}' | head -8}${color}

${color2}◈ DOCKER${color}${hr 1}
${color3}  Containers:${color} ${alignr}${execi 30 docker ps -q 2>/dev/null | wc -l} running / ${execi 30 docker ps -aq 2>/dev/null | wc -l} total
${color3}${execi 30 docker ps --format "  {{.Names}}" 2>/dev/null | head -8}${color}

${color2}◈ TOP PROCESSES (CPU)${color}${hr 1}
${color3}  Name${alignr}PID     CPU%  MEM%${color}
  ${top name 1}${alignr}${top pid 1} ${top cpu 1}% ${top mem 1}%
  ${top name 2}${alignr}${top pid 2} ${top cpu 2}% ${top mem 2}%
  ${top name 3}${alignr}${top pid 3} ${top cpu 3}% ${top mem 3}%
  ${top name 4}${alignr}${top pid 4} ${top cpu 4}% ${top mem 4}%
  ${top name 5}${alignr}${top pid 5} ${top cpu 5}% ${top mem 5}%

${color2}◈ TOP PROCESSES (MEM)${color}${hr 1}
${color3}  Name${alignr}PID     MEM%  MEM${color}
  ${top_mem name 1}${alignr}${top_mem pid 1} ${top_mem mem 1}% ${top_mem mem_res 1}
  ${top_mem name 2}${alignr}${top_mem pid 2} ${top_mem mem 2}% ${top_mem mem_res 2}
  ${top_mem name 3}${alignr}${top_mem pid 3} ${top_mem mem 3}% ${top_mem mem_res 3}

${color2}◈ SYSTEMD SERVICES${color}${hr 1}
${color3}${execi 60 systemctl list-units --type=service --state=running --no-pager --no-legend 2>/dev/null | awk '{printf "  %s %s\n", "●", $1}' | sed 's/.service//' | head -10}${color}

${color1}━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━${color}
${color2}${alignc}${font JetBrains Mono:bold:size=9}⚙ ALIBI NERD STATION ⚙${font}${color}
${color3}${alignc}${time %A, %d %B %Y - %H:%M:%S}${color}
]]
